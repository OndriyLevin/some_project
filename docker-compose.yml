services:
  app:
    build: .
    container_name: cardly
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./server/data:/app/server/data
      - ./server/uploads:/app/server/uploads
    environment:
      - NODE_ENV=production
      - JWT_SECRET=change-this-to-a-random-secret-string
