services:
  app:
    build: .
    container_name: cardly
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./server/data:/app/server/data
      - ./server/uploads:/app/server/uploads
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-me-to-random-string}
